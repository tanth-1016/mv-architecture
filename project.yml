name: MVArchitectureDemo
options:
  bundleIdPrefix: com.mvarchitecturedemo
  deploymentTarget:
    iOS: "17.0"
  swiftVersion: "6.0"
  xcodeVersion: "16"

settings:
  base:
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  MVArchitectureDemo:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
      - path: Domain
      - path: Application
      - path: Data
      - path: Presentation
      - path: Infrastructure
      - path: Support
      - path: Resources/Assets.xcassets
      - path: Resources/Localizable.xcstrings
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mvarchitecturedemo.MVArchitectureDemo
        INFOPLIST_FILE: Resources/Config/Info.plist
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        SWIFT_EMIT_LOC_STRINGS: YES

  MVArchitectureDemoTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: MVArchitectureDemo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mvarchitecturedemo.MVArchitectureDemoTests
        GENERATE_INFOPLIST_FILE: YES
